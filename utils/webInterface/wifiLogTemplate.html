<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XENO: Wi-Fi Scan Log — {ssid}</title>
    <link rel="stylesheet" href="/static/logTheme.css" />
    <style>
      /* ─── Report Nav Bar ─── */
      .report-nav {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 2rem;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.4rem 1rem;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
        text-decoration: none;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        transition: border-color 0.2s, color 0.2s;
      }
      .back-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .back-btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .report-nav-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 0.8rem;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .report-nav-ssid {
        font-family: 'Orbitron', sans-serif;
        font-size: 0.8rem;
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
</head>

<body>
  <!-- Navigation bar -->
  <nav class="report-nav">
    <a href="/" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Reports
    </a>
    <span class="report-nav-title">XENO /</span>
    <span class="report-nav-ssid">{ssid}</span>
  </nav>

  <header>
    <h1>Wi-Fi Scan Log — {ssid}</h1>
  </header>

  <section class="scan-summary">
    <h2>Scan Summary</h2>
    <h3>Discovered Devices</h3>
    {scan_entries}
  </section>

  <section class="vulnerability-details">
    <h2>Vulnerability Details</h2>
    {vulnerability_entries}
  </section>

  <footer>
    &copy; 2025 Irvin Avitia | XENO Project. Licensed under the MIT License.
  </footer>
</body>
</html>
